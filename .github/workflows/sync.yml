name: Sync ke Fork Deployment

on:
  push:
    branches: [main]

jobs:
  sync:
    name: Sync ke anitakny/rimbara-frontend-react
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo asli
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push ke fork
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git config user.name "anitakny"
          git config user.email "anitakny@users.noreply.github.com"
          git remote add fork https://$SYNC_TOKEN@github.com/anitakny/rimbara-frontend-react.git
          git push fork main --force