name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Jalankan ESLint
        run: npm run lint
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build aplikasi
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Simpan hasil build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy preview ke Vercel
        id: preview
        run: |
          PREVIEW_URL=$(vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --env VITE_API_URL=${{ secrets.VITE_API_URL }} \
            2>&1 | tail -1)
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Komentar URL preview di PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🌿 Preview Deploy Siap',
                '',
                `**URL:** ${{ steps.preview.outputs.url }}`,
                `**Commit:** \`${{ github.sha }}\``,
                `**Branch:** \`${{ github.head_ref }}\``,
              ].join('\n')
            })
            
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy production ke Vercel
        id: production
        run: |
          PROD_URL=$(vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes \
            --env VITE_API_URL=${{ secrets.VITE_API_URL }} \
            2>&1 | tail -1)
          echo "url=$PROD_URL" >> $GITHUB_OUTPUT

      - name: Tampilkan URL production
        run: |
          echo "✅ Deploy berhasil!"
          echo "🌐 URL: ${{ steps.production.outputs.url }}"
